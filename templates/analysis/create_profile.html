{% extends 'base.html' %}
{% block title %}创建风格画像{% endblock %}
{% block content %}
<h2>创建风格画像</h2>
<hr>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">画像名称</label>
        <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">选择已分析的音频</label>
        <select name="audio_id" class="form-select">
            <option value="">-- 不选择 --</option>
            {% for audio in completed_audios %}
            <option value="{{ audio.id }}">{{ audio.title }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">选择已分析的视频</label>
        <select name="video_id" class="form-select">
            <option value="">-- 不选择 --</option>
            {% for video in completed_videos %}
            <option value="{{ video.id }}">{{ video.title }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">创建</button>
</form>
{% endblock %}
