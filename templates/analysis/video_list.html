{% extends 'base.html' %}
{% block title %}视频列表{% endblock %}
{% block content %}
<h2>视频文件列表</h2>
<hr>
<a href="{% url 'analysis:upload_video' %}" class="btn btn-primary mb-3">上传视频</a>
<table class="table table-hover">
    <thead><tr><th>标题</th><th>状态</th><th>上传时间</th><th>操作</th></tr></thead>
    <tbody>
        {% for video in videos %}
        <tr><td>{{ video.title }}</td><td><span class="badge bg-{{ video.status }}">{{ video.get_status_display }}</span></td><td>{{ video.upload_time }}</td><td><a href="{% url 'analysis:video_detail' video.id %}" class="btn btn-sm btn-outline-primary">查看</a></td></tr>
        {% empty %}
        <tr><td colspan="4" class="text-center text-muted">暂无视频</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
