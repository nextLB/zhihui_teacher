{% extends 'base.html' %}

{% block title %}上传音频 - 智慧课堂{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2>上传音频</h2>
        <hr>
    </div>
</div>
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">标题</label>
                        <input type="text" name="title" class="form-control" placeholder="请输入音频标题">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="可选描述"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">音频文件</label>
                        <input type="file" name="audio_file" class="form-control" accept=".mp3,.wav,.m4a" required>
                        <small class="text-muted">支持格式：MP3、WAV、M4A</small>
                    </div>
                    <button type="submit" class="btn btn-primary">上传</button>
                    <a href="{% url 'analysis:audio_list' %}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
