{% extends 'base.html' %}

{% block title %}注册 - 智慧课堂{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4>用户注册</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">注册</button>
                </form>
                <hr>
                <p class="text-center">已有账号？<a href="{% url 'login' %}">立即登录</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
